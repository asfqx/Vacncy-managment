networks:
  vacancy_network:
    driver: bridge

volumes:
  pgdata:
  redis_data:
  admin_data:
  bot_states:
  venv_data:
  esdata:

services:

  redis:
    image: redis:7.2-alpine
    container_name: redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${CACHE_ADAPTER_PORT}:6379"
    volumes:
      - redis_data:/data
    networks:
      - vacancy_network

  db:
    image: postgres:15
    container_name: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT}:5432"
    restart: always
    networks:
      - vacancy_network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - vacancy_network
    depends_on:
      redis:
        condition: service_healthy

  minio:
    image: minio/minio
    container_name: minio
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      retries: 5
    networks:
      - vacancy_network

  taskiq_worker:
    image: vacancy_backend:latest
    container_name: taskiq_worker
    command: uv run taskiq worker app.core.broker:broker
    volumes:
      - ./src/app:/src/app:cached  # только код для live reload
      - venv_data:/src/.venv      # сохраняем виртуальное окружение
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: always
    networks:
      - vacancy_network

  taskiq_scheduler:
    image: vacancy_backend:latest
    container_name: taskiq_scheduler
    command: uv run taskiq scheduler app.core.scheduler:scheduler
    volumes:
      - ./src/app:/src/app:cached
      - venv_data:/src/.venv
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: always
    networks:
      - vacancy_network

  taskiq_admin:
    image: ghcr.io/taskiq-python/taskiq-admin:latest
    platform: linux/amd64
    container_name: taskiq_admin
    ports:
      - 3000:3000
    environment:
      - TASKIQ_ADMIN_API_TOKEN=supersecret
    volumes:
      - admin_data:/usr/database/
    depends_on:
      taskiq_worker:
        condition: service_started
      taskiq_scheduler:
        condition: service_started
    restart: always
    networks:
      - vacancy_network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - http.cors.enabled=true
      - http.cors.allow-origin=http://localhost:5173
      - http.cors.allow-credentials=true
      - http.cors.allow-headers=Authorization,Content-Type
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - esdata:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: always
    networks:
      - vacancy_network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.0
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: always
    networks:
      - vacancy_network